name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Run tests
        run: |
          # Create required directories
          mkdir -p db assets

          # Start server in background
          node backend/index.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready (max 15 seconds)
          for i in $(seq 1 30); do
            if curl -s http://localhost:3847/api/profiles > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              kill $SERVER_PID 2>/dev/null
              exit 1
            fi
            sleep 0.5
          done

          # Run backend tests
          npm run test:backend
          BACKEND_TEST_EXIT=$?

          # Run frontend tests
          npm test
          FRONTEND_TEST_EXIT=$?

          # Cleanup
          kill $SERVER_PID 2>/dev/null
          
          if [ $BACKEND_TEST_EXIT -ne 0 ] || [ $FRONTEND_TEST_EXIT -ne 0 ]; then
            exit 1
          fi
          exit 0
        env:
          NODE_ENV: test

  lint:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Auto-push fixes using RTK
        if: always()
        env:
          RTK_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd frontend && node -e "
            const fs = require('fs');
            const rtk = require('rtk-cli');

            const html = fs.readFileSync('index.html', 'utf8');
            const jsMatch = html.match(/<script>([\s\S]*?)<\/script>/);
            if (jsMatch) {
              try {
                new Function(jsMatch[1]);
                console.log('✓ Frontend code is valid');
              } catch (e) {
                console.error('✗ Frontend error:', e.message);
                process.exit(1);
              }
            }

            const rtkExec = (cmd) => {
              return new Promise((resolve, reject) => {
                const proc = require('child_process').exec(cmd, { env: { ...process.env, RTK_GITHUB_TOKEN: process.env.RTK_GITHUB_TOKEN } }, (error, stdout, stderr) => {
                  if (error && stderr) reject(new Error(stderr));
                  else resolve(stdout);
                });
              });
            };

            (async () => {
              if (process.env.RTK_GITHUB_TOKEN) {
                try {
                  const status = await rtkExec('rtk git add -A');
                  const commitMsg = \`fix: auto-push ESLint fix via CI\`;
                  const commit = await rtkExec(\`rtk git commit -m \"\${commitMsg}\"\`);
                  const push = await rtkExec('rtk git push origin HEAD');
                  console.log('✓ Auto-push successful');
                } catch (error) {
                  console.log('⚠ RTK push failed (expected on forks):', error.message);
                }
              } else {
                console.log('⚠ RTK not configured, skipping auto-push');
              }
            })();
          "
