name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Start backend server
        run: |
          mkdir -p db assets
          NODE_ENV=test node backend/index.js &
          sleep 5
          curl -X POST http://127.0.0.1:3847/api/profiles/reseed-demo -H "X-Skip-RateLimit: true" -H "X-Profile-ID: 1" || true

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_HEADLESS: true
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm run test:e2e:smoke
          else
            pnpm run test:e2e
          fi
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 30

      - name: Verify API endpoints
        run: |
          echo "Testing API endpoints..."
          curl -s http://localhost:3847/api/accounts > /dev/null && echo "✓ API/accounts OK" || echo "✗ API/accounts FAILED"
          curl -s http://localhost:3847/api/transactions/summary > /dev/null && echo "✓ API/transactions/summary OK" || echo "✗ API/transactions/summary FAILED"
          curl -s http://localhost:3847/api/housing > /dev/null && echo "✓ API/housing OK" || echo "✗ API/housing FAILED"
          curl -s http://localhost:3847/api/loans > /dev/null && echo "✓ API/loans OK" || echo "✗ API/loans FAILED"