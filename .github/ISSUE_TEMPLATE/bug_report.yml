name: Bug Report
description: Report a bug in Finance Manager
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: What area is affected?
      options:
        - Frontend (UI)
        - Backend (API)
        - Documentation
        - Build/CI
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if frontend)
      placeholder: "e.g. Chrome 125, Firefox 127"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any console errors, server logs, or screenshots
