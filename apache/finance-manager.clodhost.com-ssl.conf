<VirtualHost *:443>
    ServerName finance-manager.clodhost.com
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/finance-manager.clodhost.com/frontend

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/finance-manager.clodhost.com.crt
    SSLCertificateKeyFile /etc/ssl/private/finance-manager.clodhost.com.key

    RequestHeader set X-Forwarded-Proto "https"

    # Alias for dist directory
    Alias /dist /var/www/finance-manager.clodhost.com/frontend/dist

    <Directory /var/www/finance-manager.clodhost.com/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Serve static files directly
        <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$">
            Order allow,deny
            Allow from all
        </FilesMatch>

        RewriteEngine On

        # Serve index.html directly
        RewriteRule ^/index\.html$ - [L]

        # Serve HTML files
        RewriteCond %{REQUEST_URI} \.(html|htm)$
        RewriteRule ^ - [L]

        # Serve CSS files
        RewriteRule ^/css/.*\.css$ - [L]
        RewriteRule ^/dist/assets/css/.*\.css$ - [L]

        # Serve JavaScript files
        RewriteRule ^/dist/assets/index.js - [L]
        RewriteRule ^/dist/assets/sw.js - [L]

        # Serve manifest
        RewriteRule ^/manifest\.json$ - [L]

        # Serve dashboard settings
        RewriteRule ^/dashboard-settings\.css$ - [L]

        # Serve icons
        RewriteRule ^/icon-.*\.(png|svg)$ - [L]

        # Serve favicon
        RewriteRule ^/favicon\.ico$ - [L]

        # Serve dist assets
        RewriteRule ^/dist/assets/ - [L]

        # Redirect API requests to backend
        RewriteRule ^/api/(.*)$ http://127.0.0.1:3847/api/$1 [P,L]

        # Redirect all other requests to index.html
        RewriteRule ^ /index.html [L]
    </Directory>

    # Proxy API requests to Node.js backend
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3847/api/
    ProxyPassReverse /api/ http://127.0.0.1:3847/api/

    ErrorLog ${APACHE_LOG_DIR}/finance-manager.clodhost.com-error.log
    CustomLog ${APACHE_LOG_DIR}/finance-manager.clodhost.com-access.log combined
</VirtualHost>