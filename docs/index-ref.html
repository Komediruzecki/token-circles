    <!-- MAIN CONTENT -->
    <main id="main" style="margin-left: 240px; padding: 24px 32px">
      <h1 style="font-size: 24px; font-weight: 700">Finance Manager</h1>
      <p style="color: var(--text-secondary); margin-top: 2px; font-size: 14px">
        Original HTML/CSS reference for Sidebar Navigation Icons
      </p>
    </main>

    <script>
      // Inline script for demo - normally in separate files
      document.addEventListener('DOMContentLoaded', () => {
        // Add active state handling
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          item.addEventListener('click', (e) => {
            e.preventDefault();
            navItems.forEach(n => n.classList.remove('active'));
            item.classList.add('active');
          });
        });

        // Toggle sidebar (mobile)
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');
        const mobileOverlay = document.getElementById('mobile-overlay');

        if (hamburgerBtn && sidebar) {
          hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.toggle('mobile-open');
            mobileOverlay.style.display =
              sidebar.classList.contains('mobile-open') ? 'block' : 'none';
          });
        }

        if (mobileOverlay) {
          mobileOverlay.addEventListener('click', () => {
            sidebar.classList.remove('mobile-open');
            mobileOverlay.style.display = 'none';
          });
        }
      });
    </script>
