services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3847}:3847"
    environment:
      NODE_ENV: production
      PORT: 3847
    volumes:
      # Persist SQLite database across container restarts
      - fm-db-data:/app/db
      # Persist uploaded files
      - fm-assets-data:/app/assets
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3847/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fm-network

volumes:
  # Named volume for SQLite database persistence
  fm-db-data:
    driver: local
  # Named volume for uploaded assets persistence
  fm-assets-data:
    driver: local

networks:
  fm-network:
    driver: bridge
