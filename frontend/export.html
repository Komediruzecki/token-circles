<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annual Financial Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        padding: 40px;
        width: 800px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid #e2e8f0;
      }

      .header h1 {
        font-size: 26px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 6px;
      }

      .header .subtitle {
        font-size: 13px;
        color: #64748b;
      }

      .summary-box {
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 16px 20px;
        margin-bottom: 24px;
      }

      .summary-box h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 12px;
        text-align: center;
      }

      .summary-stats {
        display: flex;
        justify-content: space-around;
        text-align: center;
      }

      .stat-label {
        font-size: 11px;
        color: #64748b;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 18px;
        font-weight: 700;
      }

      .stat-income .stat-value {
        color: #059669;
      }
      .stat-expense .stat-value {
        color: #dc2626;
      }
      .stat-net .stat-value {
        color: #059669;
      }
      .stat-net.negative .stat-value {
        color: #dc2626;
      }

      .charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .chart-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
      }

      .chart-card.full-width {
        grid-column: 1 / -1;
      }

      .chart-card h3 {
        font-size: 13px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e2e8f0;
      }

      .chart-card canvas {
        max-width: 100%;
      }

      .monthly-table {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
        margin-top: 4px;
      }

      .monthly-table h3 {
        font-size: 13px;
        font-weight: 700;
        color: #1e293b;
        padding: 12px 16px;
        border-bottom: 1px solid #e2e8f0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead th {
        background: #f1f5f9;
        font-weight: 700;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #475569;
        padding: 8px 12px;
        text-align: right;
        border-bottom: 1px solid #e2e8f0;
      }

      thead th:first-child {
        text-align: left;
      }

      tbody tr:nth-child(even) {
        background: #f8fafc;
      }
      tbody tr:hover {
        background: #f1f5f9;
      }

      tbody td {
        padding: 7px 12px;
        text-align: right;
        border-bottom: 1px solid #f1f5f9;
      }

      tbody td:first-child {
        text-align: left;
        font-weight: 500;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }

      .val-income {
        color: #059669;
        font-weight: 600;
      }
      .val-expense {
        color: #dc2626;
        font-weight: 600;
      }
      .val-positive {
        color: #059669;
        font-weight: 600;
      }
      .val-negative {
        color: #dc2626;
        font-weight: 600;
      }

      .footer {
        margin-top: 20px;
        text-align: center;
        font-size: 11px;
        color: #94a3b8;
      }

      @media print {
        body {
          background: white;
          padding: 20px;
        }
        .chart-card {
          break-inside: avoid;
        }
        table {
          break-inside: avoid;
        }
        .charts-grid {
          break-inside: avoid;
        }
        .monthly-table {
          break-before: page;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Annual Financial Report — <span id="report-year"></span></h1>
      <div class="subtitle">
        Finance Manager &nbsp;|&nbsp; Generated: <span id="gen-date"></span>
      </div>
    </div>

    <div class="summary-box">
      <h3><span id="summary-year"></span> Annual Summary</h3>
      <div class="summary-stats">
        <div class="stat-income">
          <div class="stat-label">Total Income</div>
          <div class="stat-value" id="total-income">—</div>
        </div>
        <div class="stat-expense">
          <div class="stat-label">Total Expenses</div>
          <div class="stat-value" id="total-expense">—</div>
        </div>
        <div class="stat-net" id="net-wrap">
          <div class="stat-label">Net Savings</div>
          <div class="stat-value" id="net-savings">—</div>
        </div>
        <div class="stat-net" id="rate-wrap">
          <div class="stat-label">Savings Rate</div>
          <div class="stat-value" id="savings-rate">—</div>
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3>Spending by Category</h3>
        <canvas id="chart-category" width="340" height="200"></canvas>
      </div>
      <div class="chart-card">
        <h3>Monthly Income vs Expenses</h3>
        <canvas id="chart-monthly" width="340" height="200"></canvas>
      </div>
      <div class="chart-card full-width">
        <h3>Cumulative Cash Flow</h3>
        <canvas id="chart-cashflow" width="720" height="220"></canvas>
      </div>
    </div>

    <div class="monthly-table">
      <h3>Monthly Breakdown</h3>
      <table>
        <thead>
          <tr>
            <th>Month</th>
            <th style="text-align: right">Income</th>
            <th style="text-align: right">Expenses</th>
            <th style="text-align: right">Net</th>
            <th style="text-align: right">Running Balance</th>
          </tr>
        </thead>
        <tbody id="monthly-tbody"></tbody>
      </table>
    </div>

    <div class="footer">Generated by Finance Manager</div>

    <script>
      ;(function () {
        const symbols = { EUR: '\u20ac', USD: '$', GBP: '\u00a3', CHF: 'CHF ' }
        const currency = window.__DATA__ ? window.__DATA__.currency : 'USD'
        const sym = symbols[currency] || currency + ' '

        function fmt(amt) {
          return sym + amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')
        }

        function fmtMonth(mm) {
          // Accept both '2024-01' (YYYY-MM) and '01' (MM-only) formats
          let y, m
          if (mm.includes('-')) {
            ;[y, m] = mm.split('-')
          } else {
            y = new Date().getFullYear()
            m = mm
          }
          const d = new Date(parseInt(y), parseInt(m) - 1, 1)
          return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
        }

        const data = window.__DATA__
        if (!data) {
          document.body.innerHTML =
            '<p style="padding:40px;text-align:center;color:#dc2626;">Error: No data provided.</p>'
          window.__RENDER_DONE__ = true
          return
        }

        document.getElementById('report-year').textContent = data.year
        document.getElementById('gen-date').textContent = new Date().toLocaleDateString()
        document.getElementById('summary-year').textContent = data.year

        const totalIncome = data.summary.totalIncome
        const totalExpense = data.summary.totalExpense
        const netSavings = data.summary.netSavings
        const savingsRate = data.summary.savingsRate

        document.getElementById('total-income').textContent = fmt(totalIncome)
        document.getElementById('total-expense').textContent = fmt(totalExpense)
        document.getElementById('net-savings').textContent = fmt(netSavings)

        const netWrap = document.getElementById('net-wrap')
        if (netSavings < 0) netWrap.classList.add('negative')
        document.getElementById('savings-rate').textContent = savingsRate + '%'

        // --- Category Doughnut Chart ---
        const catCtx = document.getElementById('chart-category').getContext('2d')
        const catData = data.byCategory || []
        new Chart(catCtx, {
          type: 'doughnut',
          data: {
            labels: catData.map((c) => c.name),
            datasets: [
              {
                data: catData.map((c) => c.total),
                backgroundColor: catData.map((c) => c.color || '#6b7280'),
                borderWidth: 2,
                borderColor: '#ffffff',
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: 'right',
                labels: { font: { size: 11 }, boxWidth: 12, padding: 8 },
              },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    const val = ctx.raw
                    const sum = ctx.dataset.data.reduce((a, b) => a + b, 0)
                    const pct = sum > 0 ? ((val / sum) * 100).toFixed(1) : 0
                    return ' ' + ctx.label + ': ' + fmt(val) + ' (' + pct + '%)'
                  },
                },
              },
            },
            animation: { duration: 0 },
          },
        })

        // --- Monthly Bar Chart ---
        const monthlyCtx = document.getElementById('chart-monthly').getContext('2d')
        const monthlyData = data.monthly || []
        const monthLabels = monthlyData.map((m) => fmtMonth(m.month))
        new Chart(monthlyCtx, {
          type: 'bar',
          data: {
            labels: monthLabels,
            datasets: [
              {
                label: 'Income',
                data: monthlyData.map((m) => m.income),
                backgroundColor: 'rgba(5, 150, 105, 0.85)',
                borderRadius: 3,
              },
              {
                label: 'Expenses',
                data: monthlyData.map((m) => m.expense),
                backgroundColor: 'rgba(220, 38, 38, 0.75)',
                borderRadius: 3,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { font: { size: 11 } } },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    return ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw)
                  },
                },
              },
            },
            scales: {
              x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
              y: {
                ticks: {
                  font: { size: 10 },
                  callback: function (v) {
                    return sym + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)
                  },
                },
              },
            },
            animation: { duration: 0 },
          },
        })

        // --- Cash Flow Line Chart ---
        const cfCtx = document.getElementById('chart-cashflow').getContext('2d')
        const cfData = data.cashFlow || []
        new Chart(cfCtx, {
          type: 'line',
          data: {
            labels: cfData.map((m) => fmtMonth(m.month)),
            datasets: [
              {
                label: 'Cumulative Cash Flow',
                data: cfData.map((m) => m.cumulative),
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#2563eb',
                borderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { font: { size: 11 } } },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    return ' ' + fmt(ctx.raw)
                  },
                },
              },
            },
            scales: {
              x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
              y: {
                ticks: {
                  font: { size: 10 },
                  callback: function (v) {
                    return sym + (Math.abs(v) >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)
                  },
                },
              },
            },
            animation: { duration: 0 },
          },
        })

        // --- Monthly Breakdown Table ---
        const tbody = document.getElementById('monthly-tbody')
        let running = 0
        const monthNames = [
          'January',
          'February',
          'March',
          'April',
          'May',
          'June',
          'July',
          'August',
          'September',
          'October',
          'November',
          'December',
        ]
        const monthlyMap = {}
        ;(data.monthly || []).forEach((m) => {
          monthlyMap[m.month] = m
        })

        for (let m = 1; m <= 12; m++) {
          const monthStr = String(m).padStart(2, '0')
          const row = monthlyMap[monthStr]
          const income = row ? row.income : 0
          const expense = row ? row.expense : 0
          const net = income - expense
          running += net

          const tr = document.createElement('tr')
          tr.innerHTML =
            '<td>' +
            monthNames[m - 1] +
            '</td>' +
            '<td class="val-income">' +
            fmt(income) +
            '</td>' +
            '<td class="val-expense">' +
            fmt(expense) +
            '</td>' +
            '<td class="' +
            (net >= 0 ? 'val-positive' : 'val-negative') +
            '">' +
            fmt(net) +
            '</td>' +
            '<td class="' +
            (running >= 0 ? 'val-positive' : 'val-negative') +
            '">' +
            fmt(running) +
            '</td>'
          tbody.appendChild(tr)
        }

        // Signal that rendering is done (small delay to ensure charts fully render)
        window.__CHART_RENDER_DONE__ = true
        // Give charts 500ms to fully render before signaling done
        setTimeout(() => {
          window.__RENDER_DONE__ = true
        }, 500)
      })()
    </script>
  </body>
</html>
